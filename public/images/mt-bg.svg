<!-- mt-bg.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#071028"></stop>
      <stop offset="60%" stop-color="#07263b"></stop>
      <stop offset="100%" stop-color="#001217"></stop>
    </linearGradient>

    <linearGradient id="gWave" x1="0" x2="1">
      <stop offset="0%" stop-color="#00ffd2" stop-opacity="0.18"></stop>
      <stop offset="50%" stop-color="#00b4ff" stop-opacity="0.14"></stop>
      <stop offset="100%" stop-color="#6a7bff" stop-opacity="0.08"></stop>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <pattern id="grain" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"></rect>
      <circle cx="2" cy="2" r="0.6" fill="rgba(255,255,255,0.02)"></circle>
    </pattern>
  </defs>

  <!-- background gradient -->
  <rect width="100%" height="100%" fill="url(#g1)"></rect>

  <!-- faint contour layers (stacked paths) -->
  <g transform="translate(0,60)" opacity="0.8">
    <path d="M0,700 C200,520 400,620 650,560 C900,500 1100,620 1600,400 L1600,900 L0,900 Z" fill="none" stroke="#0b4e63" stroke-width="2" stroke-opacity="0.22"></path>
    <path d="M0,640 C220,460 420,540 700,500 C980,460 1180,560 1600,360" fill="none" stroke="#0c6b7f" stroke-width="2" stroke-opacity="0.16"></path>
    <path d="M0,580 C180,420 420,480 760,460 C1100,440 1320,520 1600,330" fill="none" stroke="#0f88a0" stroke-width="1.6" stroke-opacity="0.12"></path>
  </g>

  <!-- animated EM wave lines -->
  <g id="waves" stroke="url(#gWave)" stroke-width="2.6" fill="none" filter="url(#softGlow)" opacity="0.95">
    <path class="w1" d="M-200,500 C120,420 320,540 700,480 C1080,420 1280,520 2000,380" stroke-linecap="round"></path>
    <path class="w2" d="M-200,560 C150,480 370,600 760,530 C1150,460 1370,570 2000,430" stroke-linecap="round" stroke-width="1.8" opacity="0.9"></path>
    <path class="w3" d="M-200,620 C200,520 420,650 820,580 C1220,510 1440,640 2000,490" stroke-linecap="round" stroke-width="1.3" opacity="0.7"></path>
  </g>

  <!-- subtle grid of sample points (represent field stations) -->
  <g id="stations" opacity="0.12">
    <circle cx="160" cy="300" r="2" fill="#61f1d5"></circle>
    <circle cx="410" cy="420" r="2" fill="#61f1d5"></circle>
    <circle cx="640" cy="360" r="2" fill="#61f1d5"></circle>
    <circle cx="920" cy="420" r="2" fill="#61f1d5"></circle>
    <circle cx="1180" cy="380" r="2" fill="#61f1d5"></circle>
    <circle cx="1400" cy="300" r="2" fill="#61f1d5"></circle>
  </g>

  <!-- softly animated noise overlay -->
  <rect width="100%" height="100%" fill="url(#grain)" opacity="0.06"></rect>

  <style>
    /* animate wave movement via stroke-dashoffset */
    .w1, .w2, .w3 {
      stroke-dasharray: 1000;
      stroke-dashoffset: 0;
      animation: moveWave 18s linear infinite;
    }
    .w1 { animation-duration: 20s; opacity: 0.95; }
    .w2 { animation-duration: 26s; animation-direction: reverse; }
    .w3 { animation-duration: 32s; opacity: 0.75; }

    @keyframes moveWave {
      0% { stroke-dashoffset: 0; transform: translateX(0px); }
      50% { stroke-dashoffset: 600; transform: translateX(-40px); }
      100% { stroke-dashoffset: 0; transform: translateX(0px); }
    }

    /* responsive performance: reduce animation on small screens */
    @media (max-width: 420px) {
      .w1, .w2, .w3 { animation-duration: 40s; }
      rect[fill="url(#grain)"] { opacity: 0.03; }
    }
  </style>
</svg>
